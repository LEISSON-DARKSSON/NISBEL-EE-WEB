name: Verify static snapshot

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check verifier syntax
        run: node --check scripts/verify-static-snapshot.mjs

      - name: Run static snapshot verifier
        run: node scripts/verify-static-snapshot.mjs
